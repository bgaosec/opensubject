                    type: string
                  id:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/CustomLog'
                      next_page_token:
                        type: string
                        nullable: true
                      total_items:
                        type: integer

