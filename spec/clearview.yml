      operationId: getGalleryItem
      parameters:
        - name: gallery_item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The gallery item object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/GalleryItem'
    delete:
      tags: [gallery_items]
      summary: Delete a gallery item
      operationId: deleteGalleryItem
      parameters:
        - name: gallery_item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [gallery_items]
      summary: Update a gallery item
      operationId: updateGalleryItem
      parameters:
        - name: gallery_item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
                    format: uuid
                photos:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                values:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/FieldValue'
      responses:
        '200':
          description: The updated gallery item.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/GalleryItem'

  /api/v1/gallery_items_bulk:
    post:
      tags: [gallery_items]
      summary: Bulk import gallery items
      description: >-
        Create multiple gallery items at once. data[] array must match files[]
        array in length and order.
      operationId: createBulkGalleryItems
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [gallery_id]
              properties:
                gallery_id:
                  type: string
                  format: uuid
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                data[]:
                  type: array
                  items:
                    type: string
                  description: JSON strings with values for each file (1:1 mapping).
                gallery_agent_import_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: The job for the bulk import.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/Job'

  /api/v1/gallery_photos:
    post:
      tags: [gallery_photos]
      summary: Upload a gallery photo
      operationId: createGalleryPhoto
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                search_history_id:
                  type: string
                  format: uuid
                lat:
                  oneOf:
                    - type: string
                    - type: number
                lng:
                  oneOf:
                    - type: string
                    - type: number
      responses:
        '201':
          description: The created gallery photo object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/GalleryPhoto'

  /api/v1/gallery_tags:
    post:
      tags: [gallery_tags]
      summary: Create a gallery tag
      operationId: createGalleryTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, color]
              properties:
                label:
                  type: string
                color:
                  type: string
                  description: Hex colour value.
      responses:
        '201':
          description: The created gallery tag.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/GalleryTag'
    get:
      tags: [gallery_tags]
      summary: List gallery tags
      operationId: listGalleryTags
      parameters:
        - $ref: '#/components/parameters/PageToken'
        - $ref: '#/components/parameters/MaxPageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: A paged list of gallery tags.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/GalleryTag'
                      next_page_token:
                        type: string
                        nullable: true
                      total_items:
                        type: integer

  /api/v1/organization_exports:
    post:
      tags: [company_jobs]
      summary: Export organization data
      description: >-
        Request a full data export for the organisation. Multiple export requests
        can coexist.
      operationId: createOrganizationExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id]
              properties:
                organization_id:
                  type: string
                  description: UUID of organisation to create export for.
                immediate:
                  type: boolean
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/users:
    get:
      tags: [users]
      summary: List users
      description: Get all users, scoped by organisation, group, or search criteria.
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/UserGroupId'
        - name: search
          in: query
          schema:
            type: string
          description: Search by user name or email.
        - name: format
          in: query
          schema:
            type: string
            enum: [csv]
          description: Set to csv to generate a CSV user report.
        - name: company_type
          in: query
          schema:
            type: string
          description: Filter by company type (only when format=csv).
        - name: state
          in: query
          schema:
            type: string
          description: Filter by state (only when format=csv).
        - name: active
          in: query
          schema:
            type: boolean
          description: If true, return only unsuspended users.
        - name: gallery_coalition_contact
          in: query
          schema:
            type: boolean
          description: If true, return only gallery coalition contacts.
        - $ref: '#/components/parameters/PageToken'
        - $ref: '#/components/parameters/MaxPageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: A paged list of users (or CSV download).
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                      next_page_token:
                        type: string
                        nullable: true
                      total_items:
                        type: integer

  /api/v1/users/{user_id}:
    get:
      tags: [users]
      summary: Get a user
      description: Get a user by id, or pass "me" for the logged-in user.
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: User UUID or "me" for logged-in user.
      responses:
        '200':
          description: The user object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
    patch:
      tags: [users]
      summary: Update a user
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: User UUID or "me".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                title:
                  type: string
                phone_number:
                  type: string
                  description: E.164 format phone number.
                company_id:
                  type: string
                  format: uuid
                preferred_2fa_method:
                  type: string
                  enum: [email, sms, totp]
                current_password:
                  type: string
                new_password:
                  type: string
                new_password_confirm:
                  type: string
                role_type:
                  type: integer
                  enum: [0, 1, 4, 5]
                suspended:
                  type: number
                enabled_features:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                set_feature_override:
                  type: object
                  properties:
                    company:
                      type: string
                    default_enabled:
                      type: boolean
                    effective_level:
                      type: string
                    feature:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        default_enabled:
                          type: boolean
                    user:
                      type: string
                    user_group:
                      type: string
                popup_actions:
                  type: array
                  items:
                    type: object
                    properties:
                      popup_name:
                        type: string
                      accepted:
                        type: boolean
                banner_text:
                  type: string
                  nullable: true
                gallery_coalition_contact:
                  type: boolean
                  nullable: true
                totp_code:
                  type: string
                disabled_app_notifications:
                  type: array
                  items:
                    type: string
                disabled_email_notifications:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  id:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
