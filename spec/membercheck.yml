    MbrChk.UI.Model.ScanInputParam:
      type: object
      properties:
        matchType:
          enum:
          - Close
          - Exact
          - ExactMidName
          type: string
          description: "Used to determine how closely a watchlist entity name must match a member before being considered\
            \ a match.\r\nThis is mandatory to be defined if the Organisation's Scan Settings in the web application is set\
            \ to `User Defined`.\r\nPlease check with your Compliance Officer about the Organisation's Scan Settings.\r\n\
            See below for supported values."
          nullable: true
        closeMatchRateThreshold:
          pattern: ^(\d?[1-9]|[1-9]0|100)$
          type: integer
          description: Used to refine Close Match results by setting a Close Match Rate threshold (1 to 100). This is only
            applicable if `matchType` is `Close`.
          format: int32
          default: 80
          nullable: true
          example: 80
        whitelist:
          enum:
          - Apply
          - Ignore
          type: string
          description: "Used for eliminating match results previously determined to not be a true match.\r\nThis is mandatory\
            \ to be defined if the Organisation's Scan Settings in the web application is set to `User Defined`.\r\nPlease\
            \ check with your Compliance Officer of the Organisation's Scan Settings."
          nullable: true
        residence:
          enum:
          - Ignore
          - ApplyPEP
          - ApplySIP
          - ApplyRCA
          - ApplyPOI
          - ApplyAll
          type: string
          description: "Used for eliminating match results where the member and matching entity have a different Country of\
            \ Residence.\r\nThis is mandatory to be defined if the Organisation's Scan Settings in the web application is\
            \ set to `User Defined`.\r\nPlease check with your Compliance Officer of the Organisation's Scan Settings."
          nullable: true
        blankAddress:
          enum:
          - ApplyResidenceCountry
          - Ignore
          type: string
          description: Used in conjunction with the preset Default Country of Residence in the Organisation's Scan Settings
            in the web application to apply the default Country if member addresses are blank.
          nullable: true
        pepJurisdiction:
          enum:
          - Apply
          - Ignore
          type: string
          description: "Used for eliminating/including match results where the matching watchlist entity is a PEP whose country\
            \ of Jurisdiction is selected for exclusion/inclusion in the organisation's settings.\r\nThis is mandatory to\
            \ be defined if the Organisation's Scan Settings in the web application is set to `User Defined`.\r\nPlease check\
            \ with your Compliance Officer of the Organisation's Scan Settings."
          nullable: true
        excludeDeceasedPersons:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: "Used for eliminating deceased persons in match results.\r\nThis is optional if the Organisation's\
            \ Scan Settings in the web application is set to `User Defined`.\r\nPlease check with your Compliance Officer\
            \ of the Organisation's Scan Settings."
          nullable: true
        memberNumber:
          maxLength: 100
          minLength: 0
          type: string
          description: Your Customer Reference, Client or Account ID to uniquely identify the individual. This is required
            if you wish to record due diligence decisions for any matched entities. This property has been superseded and
            will be deprecated in the future. Please use `clientId` instead.
          nullable: true
        clientId:
          maxLength: 100
          minLength: 0
          type: string
          description: Your Customer Reference, Client or Account ID to uniquely identify the individual. This is required
            if you wish to record due diligence decisions for any matched entities.
          nullable: true
        firstName:
          maxLength: 255
          minLength: 0
          type: string
          description: "Member's First Name - this field is mandatory (unless you are entering an Script Name / Full Name).\r\
            \nTo specify a mononym (single name), enter a dash (-) in this parameter and the mononym in `lastName`."
          nullable: true
        middleName:
          maxLength: 255
          minLength: 0
          type: string
          description: Member's Middle Name - if available.
          nullable: true
        lastName:
          maxLength: 255
          minLength: 0
          type: string
          description: Member's Last Name - this field is mandatory (unless you are entering an Script Name / Full Name).
          nullable: true
        scriptNameFullName:
          maxLength: 255
          minLength: 0
          type: string
          description: "This parameter is available if the Compliance Officer has enabled the setting  `Original Script Search/Full\
            \ Name` in the Organisation Settings.\r\nThis parameter has multiple uses and supports either the individual's\
            \ full name in original script text (e.g. Cyrillic, Arabic, Chinese etc), or the full Latin-based name if you\
            \ are unable to separate based on First, Middle and Last Name.\r\nThis field is mandatory, unless you are entering\
            \ a First and Last Name."
          nullable: true
        gender:
          maxLength: 15
          minLength: 0
          type: string
          description: Member's gender - if available. `Male`, `Female` and blank are acceptable values.
          nullable: true
        dob:
          maxLength: 10
          minLength: 0
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/(19|20)\d{2})|(19|20)\d{2}$
          type: string
          description: Member's Date of Birth - if available, using the format DD/MM/YYYY or YYYY. Matching is performed on
            date of birth, for exact matches, if it is entered.
          nullable: true
          example: DD/MM/YYYY
        dobTolerance:
          pattern: ^(\d?[0-9])$
          type: integer
          description: 'Allowance for date of birth variations: The tolerance will be ± [X] years around the member''s year
            of birth, taking into account possible discrepancies. There is a maximum tolerance variation of 9 years.'
          format: int32
          nullable: true
        idNumber:
          maxLength: 100
          minLength: 0
          type: string
          description: Member identifier - such as National ID, Passport Number, Professional Registration ID, VAT/Tax Number,
            Insolvency ID or equivalent. If you enter an ID Number, it will be used in the matching process and matches will
            only be returned if the ID Number is 'contained' in the watchlist record. Profiles that do not have any registered
            identifiers will not be returned as a match. <strong>This should be used with care and is useful for filtering
            potentially large number of results when screening popular and commonly used names.</strong>
          nullable: true
        address:
          maxLength: 255
          minLength: 0
          type: string
          description: Member's Address - there are no restrictions imposed on the format. No matching is performed on address
            but it is used for comparing country of residence when the Residence Policy is applied.
          nullable: true
        country:
          maxItems: 5
          type: array
          items:
            type: string
          description: Member's Country of residence - Supports multiple values up to a maximum of 5. Format should be ISO
            3166-1 alpha-2.
          nullable: true
          example:
          - AU
          - NZ
          - DE
          - ID
          - OM
        nationality:
          maxItems: 5
          type: array
          items:
            type: string
          description: Member's Nationality - Supports multiple values up to a maximum of 5. Format should be ISO 3166-1 alpha-2.
          nullable: true
          example:
          - AU
          - NZ
          - DE
          - ID
          - OM
        includeResultEntities:
          enum:
          - 'Yes'
          - 'No'
          type: string
          description: Include full profile information of all matched entities to be returned in `resultEntity`. This is
            enabled by default if not explicitly defined.
          nullable: true
        updateMonitoringList:
          enum:
          - ForceUpdate
          - 'No'
          - 'Yes'
          type: string
          description: Used for adding the member to the Monitoring List if `clientId/memberNumber` is specified and the Monitoring
            setting for the organisation and the user access rights are enabled. Please ask your Compliance Officer to check
            these Organisation and User Access Rights settings via the web application. Please note that if an existing member
            with the same `clientId/memberNumber` exists in the Monitoring List, it can be replaced with the new scan with
            the option `ForceUpdate`.
          nullable: true
          example: 'No'
        includeWebSearch:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including adverse media results on the web using Google search engine.
          nullable: true
        includeAdvancedMedia:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including advanced media results.
          nullable: true
        dataBreachCheckParam:
          allOf:
          - $ref: '#/components/schemas/MbrChk.UI.Model.DataBreachCheckInputParam'
          description: Data Breach Check parameter - includes Email Address.
          nullable: true
        idvParam:
          allOf:
          - $ref: '#/components/schemas/MbrChk.UI.Model.IDVScanInputParam'
          description: Member's ID Verification parameters - if required, which includes mobile number and the country which
            member is verified for.
          nullable: true
        includeJurisdictionRisk:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including FATF Jurisdiction Risk ratings for technical compliance and efficiency, based on
            FATF recommendations, for countries linked to matched profiles.
          nullable: true
        watchlists:
          maxItems: 6
          type: array
          items:
            type: string
          description: Used for matching watchlist for scan profiles. The acceptable values ​​are `PEP`, `POI`, `RCA`, `SIP`,
            `Official Lists` and `Custom Watchlists`. If watchlist is not passed or is `NULL`, the setting configured in the
            organization's list access will be used as default.
          nullable: true
        includeRiskAssessment:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Indicates whether a risk assessment check is included.
          nullable: true
        ignoreBlankPolicy:
          enum:
          - DOB
          - Gender
          - IDNumber
          - Nationality
          type: string
          description: Used for filtering result profiles with blank related entries.
          nullable: true
      additionalProperties: false
      description: Scan parameters, which include match type and policy options, to be applied to each scan.
