    get:
      tags:
      - data-management
      summary: Returns member scan history.
      description: <b>Administration - Data Mgmt</b> Data from selected single scans.
      operationId: data_management_getindividualscanhistory
      parameters:
      - name: from
        in: query
        description: Scan date from (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: to
        in: query
        description: Scan date to (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: firstName
        in: query
        description: All or part of First Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: middleName
        in: query
        description: All or part of Middle Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: lastName
        in: query
        description: Full Last Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: scriptNameFullName
        in: query
        description: Full Original Script Name or Full Name. Only enter original script or full name in this parameter (i.e.
          Chinese, Japanese, Cyrillic, Arabic etc).
        schema:
          type: string
          default: ''
      - name: clientId
        in: query
        description: Full Client ID.
        schema:
          type: string
          default: ''
      - name: scanType
        in: query
        description: Scan Type. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - Single
            - Batch
            - Automatic
            - MonitoringRescan
            type: string
          default:
          - Single
      - name: scanService
        in: query
        description: Scan Service type. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - PepAndSanction
            - IDVerification
            - RiskAssessment
            type: string
          default:
          - PepAndSanction
      - name: scanResult
        in: query
        description: Scan Result Matched or Not Matched.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NoMatchesFound
            - MatchesFound
            type: string
          default:
          - NoMatchesFound
          - MatchesFound
      - name: pageIndex
        in: query
        description: The page index of results.
        schema:
          type: integer
          format: int32
          default: 0
      - name: pageSize
        in: query
        description: The number of items or results per page or request.
        schema:
          type: integer
          format: int32
          default: 20
      - name: includeSupportingDocument
        in: query
        description: ''
        schema:
          type: boolean
          default: false
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
