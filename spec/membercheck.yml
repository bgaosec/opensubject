          type: string
          default: ''
      - name: clientId
        in: query
        description: All or part of Client ID.
        schema:
          type: string
          default: ''
      - name: registrationNumber
        in: query
        description: All or part of Registration Number.
        schema:
          type: string
          default: ''
      - name: scanResult
        in: query
        description: Scan Result Matched or Not Matched.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NoMatchesFound
            - MatchesFound
            type: string
          default:
          - NoMatchesFound
          - MatchesFound
      - name: category
        in: query
        description: Category of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - TER
            - SIE
            - POI
            - SOE
            - All
            type: string
          default:
          - All
      - name: subCategory
        in: query
        description: SIE subcategories of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - SanctionsLists
            - LawEnforcement
            - RegulatoryEnforcement
            - OrganisedCrime
            - FinancialCrime
            - NarcoticsCrime
            - ModernSlavery
            - BriberyAndCorruption
            - CyberCrime
            - DisqualifiedDirectors
            - ReputationalRisk
            - Other
            - Insolvency
            - CustomWatchlist
            - WarCrimes
            - EndUseControl
            - EnvironmentalCrime
            - Fugitive
            - Gambling
            - HumanRightsViolation
            - InterstateCommerceViolation
            - LabourViolation
            - PharmaTrafficking
            - Piracy
            - UnauthorisedIncident
            - FormerSanctions
            - All
            type: string
          default:
          - All
      - name: decision
        in: query
        description: Due diligence decision of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NotReviewed
            - Match
            - NoMatch
            - NotSure
            - All
            type: string
          default:
          - All
      - name: risk
        in: query
        description: Assessed risk level of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - High
            - Medium
            - Low
            - Unallocated
            - All
            type: string
          default:
          - All
      - name: monitoringStatus
        in: query
        description: Outcome of the monitoring status of the scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NewMatches
            - UpdatedMatches
            - RemovedMatches
            - NoChanges
            - All
            type: string
          default:
          - NewMatches
          - UpdatedMatches
          - RemovedMatches
      - name: X-Request-Language
        in: header
        description: "This field is optional and used to specify the language in which report will be downloaded (English\
          \ (EN), Français (FR), العربیة (AR), 中文（简体）(ZH), 日本語 (JA), Español (ES)). If not specified, the default language\
          \ English (EN) will be used. \n\nSupported values: `EN`, `FR`, `ZH`, `AR`, `JA`, `ES`."
        schema:
          type: string
      responses:
        '200':
          description: Report file byte array.
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '403':
          description: The server is not able to fulfill the request.
        '404':
          description: The requested resource not found.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
