  /api/v2/member-scans/single/{id}:
    get:
      tags:
      - member-scans
      summary: Returns details of a specific member scan.
      description: <b>Member Scan - Scan History - Detail of Scan History</b> returns details of the Scan Parameters used
        and member information that was scanned and lists Found Entities that were identified from the Watchlists as possible
        matches.
      operationId: member_single_scans_getonescan
      parameters:
      - name: id
        in: path
        description: The identifier of a specific member scan. The `GET /member-scans/single` or `POST /member-scans/single`
          API method response class returns this identifier in `scanId`.
        required: true
        schema:
          type: integer
          format: int32
      - name: fields
        in: query
        description: To retrieve specific fields in the response, use this parameter. Default value is `scanParam, scanResult,
          resultEntities`, you can also request `decisions` field.
        schema:
          type: string
      - name: category
        in: query
        description: Category of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - TER
            - PEP
            - SIP
            - RCA
            - POI
            - All
            type: string
          default:
          - All
      - name: subCategory
        in: query
        description: SIP subcategories of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - SanctionsLists
            - LawEnforcement
            - RegulatoryEnforcement
            - OrganisedCrime
            - FinancialCrime
            - NarcoticsCrime
            - ModernSlavery
            - BriberyAndCorruption
            - CyberCrime
            - DisqualifiedDirectors
            - ReputationalRisk
            - Other
            - Insolvency
            - CustomWatchlist
            - WarCrimes
            - EndUseControl
            - EnvironmentalCrime
            - Fugitive
            - Gambling
            - HumanRightsViolation
            - InterstateCommerceViolation
            - LabourViolation
            - PharmaTrafficking
            - Piracy
            - UnauthorisedIncident
            - FormerSanctions
            - All
            type: string
          default:
          - All
      responses:
        '200':
          description: ScanHistoryDetail; details of the Scan Parameters used and member information that was scanned and
            lists Found Entities that were identified from the Watchlists as possible matches. The returned `scanResult.matchedEntities.resultId`
            of each matched entity should be used in `GET /member-scans/single/results/{id}` API method to obtain entity profile
            information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.ScanHistoryDetail'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '403':
          description: The server is not able to fulfill the request.
        '404':
          description: The requested resource not found.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
  /api/v2/member-scans/single/{id}/rescan:
    post:
      tags:
      - member-scans
      summary: Performs member rescan based on previously scanned data.
      description: <b>Member Scan - Scan History - Rescan</b> allows you to rescan members based on previously scanned data.
      operationId: member_single_scans_postonescan
      parameters:
      - name: id
        in: path
        description: The identifier of a specific member scan. The `GET /member-scans/single` or `POST /member-scans/single`
          API method response class returns this identifier in `scanId`.
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.ScanHistoryDetail'
        '201':
          description: ScanHistoryDetail; details of the Scan Parameters used and member information that was rescanned and
            lists Found Entities that were identified from the Watchlists as possible matches. The returned `scanResult.matchedEntities.resultId`
            of each matched entity should be used in `GET /member-scans/single/results/{id}` API method to obtain entity profile
            information.
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
  /api/v2/member-scans/single/{id}/report:
    get:
      tags:
      - member-scans
      summary: Downloads report file of Full Profile Information of the scanned entity.
      description: <b>Member Scan - Scan History - Report</b> Downloads report file of information on the scanned entity.
      operationId: member_single_scans_getallmemberdetailsreport
      parameters:
      - name: id
        in: path
        description: The scan id of a specific scanned entity.
        required: true
        schema:
          type: integer
          format: int32
      - name: format
        in: query
        description: Specify the report file format. Options are `PDF`, `Excel`, `Word`. If no format is defined, the default
          is `PDF`.
        schema:
          enum:
          - PDF
          - Word
          - Excel
          type: string
          default: PDF
      - name: X-Request-Language
        in: header
