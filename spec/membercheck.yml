components:
  schemas:
    MbrChk.Business.WebhookNotification:
      type: object
      properties:
        enable:
          type: boolean
        url:
          type: string
          nullable: true
        service:
          enum:
          - None
          - Slack
          - Mattermost
          type: string
        channelName:
          type: string
          nullable: true
      additionalProperties: false
    MbrChk.Common.SourceListDocument:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        dataSource:
          enum:
          - None
          - DowJones
          - ThomsonReuters
          - MemberCheck
          - Acuris
          - LexisNexis
          - CustomList
          type: string
        visible:
          type: boolean
      additionalProperties: false
    MbrChk.UI.Model.AIAnalysisInputParam:
      required:
      - question
      type: object
      properties:
        question:
          minLength: 1
          type: string
          description: Question to be asked for AI Analysis.
        helperText:
          type: string
          description: Used to define question context for AI Analysis.
          nullable: true
      additionalProperties: false
      description: AIAnalysisInputParam which includes ScanResultId, Question and Helpertext.
    MbrChk.UI.Model.AIAnalysisResultInfo:
      type: object
      properties:
        id:
          type: integer
