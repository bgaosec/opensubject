  /api/v2/corp-scans/batch:
    post:
      tags:
      - corp-scans
      summary: Performs new corporate batch scan.
      description: <b>Corporate Scan - Batch Scan</b> allows you to scan uploaded batch files of company data against the
        lists and Watchlists to which your organisation has access.
      operationId: corp_batch_scans_postscan
      parameters:
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                param:
                  allOf:
                  - $ref: '#/components/schemas/MbrChk.UI.Model.CorpBatchScanInputParam'
                  description: Scan parameters, which include match type and whitelist policy, are applied to each scan.
                File:
                  type: string
                  description: Batch file containing companies
                  format: binary
            encoding:
              param:
                style: form
              File:
                style: form
      responses:
        '201':
          description: 'BatchScanResult: contains batch scan identifier. The returned `batchScanId` should be used in `GET
            /corp-scans/batch/{id}` API method to obtain details of this batch scan.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.BatchScanResult'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '409':
          description: An existing batch file with the same file name has been run within the last 12 months.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
