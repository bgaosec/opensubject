        in: query
        description: Specify the report file format. Options are `PDF`, `Excel`, `Word`. If no format is defined, the default
          is `PDF`.
        schema:
          enum:
          - PDF
          - Word
          - Excel
          type: string
          default: PDF
      - name: companyName
        in: query
        description: All or part of Company Name.
        schema:
          type: string
          default: ''
