        schema:
          type: string
          default: ''
      - name: clientId
        in: query
        description: Full Client ID.
        schema:
          type: string
          default: ''
      - name: idNumber
        in: query
        description: Full ID Number.
        schema:
          type: string
          default: ''
      - name: scanType
