  /api/v2/member-scans/batch:
    post:
      tags:
      - member-scans
      summary: Performs new member batch scan.
      description: <b>Member Scan - Batch Scan</b> allows you to scan uploaded batch files of member data against selected
        watchlists.
      operationId: member_batch_scans_postscan
      parameters:
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                param:
                  allOf:
                  - $ref: '#/components/schemas/MbrChk.UI.Model.BatchScanInputParam'
                  description: Scan parameters, which include match type and policy options, applicable to each scan. Please
                    check with your Compliance Officer the Organisation's Scan Setting requirements in the MemberCheck web
                    application.
                File:
                  type: string
                  description: Batch file containing members
                  format: binary
            encoding:
              param:
                style: form
              File:
                style: form
      responses:
        '201':
          description: BatchScanResult; contains batch scan identifier. The returned `batchScanId` should be used in `GET
            /member-scans/batch/{id}` API method to obtain details of this batch scan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.BatchScanResult'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '409':
          description: An existing batch file with the same file name has been run within the last 12 months.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
    get:
      tags:
      - member-scans
      summary: Returns member batch scan history.
      description: <b>Member Scan - Batch Scan History</b> provides a record of all batch scans performed for the selected
        organisation.
      operationId: member_batch_scans_getallscans
      parameters:
      - name: from
        in: query
        description: Scan date from (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: to
        in: query
        description: Scan date to (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: sort
        in: query
        description: Return results sorted by this parameter.
        schema:
          type: string
      - name: pageIndex
        in: query
        description: The page index of results.
        schema:
          type: integer
          format: int32
          default: 0
      - name: pageSize
        in: query
        description: The number of items or results per page or request.
        schema:
          type: integer
          format: int32
          default: 20
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
      responses:
        '200':
          description: Array of BatchScanHistoryLog; lists the batch files that have been uploaded and includes Date and time,
            File name, Number of Members Scanned, Number of Matched Members, Total Number of Matches and Status of the scan.
            The returned `batchScanId` should be used in `GET /member-scans/batch/{id}` API method to obtain details of each
            batch scan.
          content:
