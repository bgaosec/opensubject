        in: query
        description: Specify the report file format. Options are `PDF`, `Excel`, `Word`. If no format is defined, the default
          is `PDF`.
        schema:
          enum:
          - PDF
          - Word
          - Excel
          type: string
          default: PDF
      - name: firstName
        in: query
        description: All or part of First Name. Only enter Latin or Roman scripts in this parameter.
