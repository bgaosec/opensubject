    MbrChk.UI.Model.CorpScanInputParam:
      required:
      - companyName
      type: object
      properties:
        matchType:
          enum:
          - Close
          - Exact
          type: string
          description: "Used to determine how closely a watchlist corporate entity name must match a company before being\
            \ considered a match.\r\nThis is mandatory to be defined if the Organisation's Scan Settings in the web application\
            \ is set to `User Defined`.\r\nPlease check with your Compliance Officer about the Organisation's Scan Settings.\r\
            \nSee below for supported values."
          nullable: true
        closeMatchRateThreshold:
          pattern: ^(\d?[1-9]|[1-9]0|100)$
          type: integer
          description: Used to refine Close Match results by setting a Close Match Rate threshold (1 to 100). This is only
            applicable if `matchType` is `Close`.
          format: int32
          default: 80
          nullable: true
          example: 80
        whitelist:
          enum:
          - Apply
          - Ignore
          type: string
          description: "Used for eliminating match results previously determined to not be a true match.\r\nThis is mandatory\
            \ to be defined if the Organisation's Scan Settings in the web application is set to `User Defined`.\r\nPlease\
            \ check with your Compliance Officer of the Organisation's Scan Settings."
          nullable: true
        addressPolicy:
          enum:
          - Ignore
          - ApplyAll
          type: string
          description: Used for matching corporate and watchlist profiles that have the same Country of Operation or Registration.
          nullable: true
        blankAddress:
          enum:
          - ApplyDefaultCountry
          - Ignore
          type: string
          description: Used in conjunction with the preset Default Country of Operation in the Organisation's Scan Settings
            in the web application to apply the default Country if corporate addresses are blank.
          nullable: true
        companyName:
          maxLength: 255
          minLength: 0
          type: string
          description: Company name - this field is mandatory.
        idNumber:
          maxLength: 100
          minLength: 0
          type: string
          description: Company ID Number - such as ABN, ACN or equivalent. If you enter an ID Number it will be used in the
            matching process and Company Name matches will be returned if the ID Number is 'contained' in the watchlist record.
            This property has been superseded and will be deprecated in the future. Please use `registrationNumber` instead.
          nullable: true
        registrationNumber:
          maxLength: 100
          minLength: 0
          type: string
          description: Company Registration Number - such as ABN, ACN or equivalent. If you enter a Registration Number it
            will be used in the matching process and Company Name matches will be returned if the Registration Number is 'contained'
            in the watchlist record.
          nullable: true
        entityNumber:
          maxLength: 100
          minLength: 0
          type: string
          description: Your Customer Reference, Client or Account ID to uniquely identify the company. This is required if
            you wish to record due diligence decisions for any matched entities. This property has been superseded and will
            be deprecated in the future. Please use `clientId` instead.
          nullable: true
        clientId:
          maxLength: 100
          minLength: 0
          type: string
          description: Your Customer Reference, Client or Account ID to uniquely identify the company. This is required if
            you wish to record due diligence decisions for any matched entities.
          nullable: true
        address:
          maxLength: 255
          minLength: 0
          type: string
          description: Company Address - you can enter the ISO 3166-1 2-letter country code, or the country name. You can
            also enter the full address (there are no restrictions imposed on the address format). Only the country component
            will be used for comparing country of operation or registration when the Country of Operation policy (`addressPolicy`)
            is applied.
          nullable: true
        country:
          maxItems: 5
          type: array
          items:
            type: string
          description: Company Country - Supports multiple values up to a maximum of 5. Format should be ISO 3166-1 alpha-2.
          nullable: true
          example:
          - AU
          - NZ
          - DE
          - ID
          - OM
        includeResultEntities:
          enum:
          - 'Yes'
          - 'No'
          type: string
          description: Include full profile information of all matched entities to be returned in `resultEntity`. This is
            enabled by default if not explicitly defined.
          nullable: true
        updateMonitoringList:
          enum:
          - ForceUpdate
          - 'No'
          - 'Yes'
          type: string
          description: Used for adding the company to the Monitoring List if `clientId/entityNumber` is specified and the
            Monitoring setting for the organisation and the user access rights are enabled. Please ask your Compliance Officer
            to check these Organisation and User Access Rights settings via the web application. Please note that if an existing
            company with the same `clientId/entityNumber` exists in the Monitoring List, it can be replaced with the new scan
            with the option `ForceUpdate`.
          nullable: true
          example: 'No'
        includeWebSearch:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including adverse media results on the web using Google search engine.
          nullable: true
        includeAdvancedMedia:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including advanced media results.
          nullable: true
        includeJurisdictionRisk:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Used for including FATF Jurisdiction Risk ratings for technical compliance and efficiency, based on
            FATF recommendations, for countries linked to matched profiles.
          nullable: true
        kybParam:
          allOf:
          - $ref: '#/components/schemas/MbrChk.UI.Model.KYBInputParam'
          description: KYB Input Parameters.
          nullable: true
        watchlists:
          maxItems: 5
          type: array
          items:
            type: string
          description: Used for matching watchlist for scan profiles. The acceptable values ​​are `POI`, `SIE`, `Official
            Lists`, `SOE` and `Custom Watchlists`. If watchlist is not passed or is `NULL`, the setting configured in the
            organization's list access will be used as default.
          nullable: true
        includeRiskAssessment:
          enum:
          - 'No'
          - 'Yes'
          type: string
          description: Indicates whether a risk assessment check is included.
          nullable: true
        ignoreBlankPolicy:
          enum:
          - RegistrationNumber
          type: string
          description: Used for filtering result profiles with blank related entries.
          nullable: true
      additionalProperties: false
      description: Scan parameters, which include match type and policy options, applicable to each scan.
