            - All
            type: string
          default:
          - NewMatches
          - UpdatedMatches
          - RemovedMatches
      - name: idvStatus
        in: query
        description: ID Verification result status. Only applicable for IDVerification scanService. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NotVerified
