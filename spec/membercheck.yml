  /api/v2/member-scans/batch/{id}:
    get:
      tags:
      - member-scans
      summary: Returns details of a specific batch scan.
      description: <b>Member Scan - Batch Scan History - View Exception Report</b> shows the batch scan results and a list
        of matched members.
      operationId: member_batch_scans_getonescan
      parameters:
      - name: id
        in: path
        description: The identifier of a specific member batch scan. The `GET /member-scans/batch` or `POST /member-scans/batch`
          API method response class returns this identifier in `batchScanId`.
        required: true
        schema:
          type: integer
          format: int32
      - name: firstName
        in: query
        description: All or part of First Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: middleName
        in: query
        description: All or part of Middle Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: lastName
        in: query
        description: Full Last Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: scriptNameFullName
        in: query
        description: Full Original Script Name or Full Name. Only enter original script or full name in this parameter (i.e.
          Chinese, Japanese, Cyrillic, Arabic etc).
        schema:
          type: string
          default: ''
      - name: memberNumber
        in: query
        description: Full Member Number. This property has been superseded and will be deprecated in the future. Please use
          `clientId` instead.
        schema:
          type: string
          default: ''
      - name: clientId
        in: query
        description: Full Client ID.
        schema:
          type: string
          default: ''
      - name: idNumber
        in: query
        description: Full ID Number.
        schema:
          type: string
          default: ''
      - name: scanResult
        in: query
        description: Scan Result Matched or Not Matched.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NoMatchesFound
            - MatchesFound
            type: string
          default:
          - MatchesFound
      - name: category
        in: query
        description: Category of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - TER
            - PEP
            - SIP
            - RCA
            - POI
            - All
            type: string
          default:
          - All
      - name: subCategory
        in: query
        description: SIP subcategories of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - SanctionsLists
            - LawEnforcement
            - RegulatoryEnforcement
            - OrganisedCrime
            - FinancialCrime
            - NarcoticsCrime
            - ModernSlavery
            - BriberyAndCorruption
            - CyberCrime
            - DisqualifiedDirectors
            - ReputationalRisk
            - Other
            - Insolvency
            - CustomWatchlist
            - WarCrimes
            - EndUseControl
            - EnvironmentalCrime
            - Fugitive
            - Gambling
            - HumanRightsViolation
            - InterstateCommerceViolation
            - LabourViolation
            - PharmaTrafficking
            - Piracy
            - UnauthorisedIncident
            - FormerSanctions
            - All
            type: string
          default:
          - All
      - name: decision
        in: query
        description: Due diligence decision of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NotReviewed
            - Match
            - NoMatch
            - NotSure
            - All
            type: string
          default:
          - All
      - name: risk
        in: query
        description: Assessed risk level of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - High
            - Medium
            - Low
            - Unallocated
            - All
            type: string
          default:
          - All
      - name: pageIndex
        in: query
        description: The page index of results.
        schema:
          type: integer
          format: int32
          default: 0
      - name: pageSize
        in: query
        description: The number of items or results per page or request.
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        '200':
          description: BatchScanResults; lists the batch scan results and a list of matched members. The returned `matchedEntities.scanId`
            should be used in `GET /member-scans/single/{id}` API method to obtain details of each member scan of this batch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.BatchScanResults'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '403':
          description: The server is not able to fulfill the request.
        '404':
          description: The requested resource not found.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
