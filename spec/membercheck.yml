      description: <b>Member Scan - Monitoring History - View Exception Report - Download Report</b> Downloads a report of
        monitoring scan results and a list of members with detected changes and new matches in Excel, Word or PDF. Returns
        up to 10,000 records.
      operationId: member_monitoring_scans_getonescanreport
      parameters:
