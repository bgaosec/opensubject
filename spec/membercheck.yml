openapi: 3.0.1
info:
  title: MemberCheck API
  version: '2.0'
paths:
  /api/v2/member-scans/single:
    post:
      tags:
      - member-scans
      summary: Performs new member single scan.
      description: <b>Member Scan - Scan New</b> allows you to scan members by entering member information into the fields
        provided.
      operationId: member_single_scans_postscan
      parameters:
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
      requestBody:
        description: Scan parameters, which include match type and policy options, applicable to each scan. Please check with
          your Compliance Officer the Organisation's Scan Setting requirements in the MemberCheck web application.
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/MbrChk.UI.Model.ScanInputParam'
              description: Scan parameters, which include match type and policy options, to be applied to each scan.
          application/*+json:
            schema:
              allOf:
              - $ref: '#/components/schemas/MbrChk.UI.Model.ScanInputParam'
              description: Scan parameters, which include match type and policy options, to be applied to each scan.
      responses:
        '201':
          description: 'ScanResult: contains brief information of matched entities. The returned `scanId` should be used in
            `GET /member-scans/single/{id}` API method to obtain details of this scan. The returned `matchedEntities.resultId`
            of each matched entity should be used in `GET /member-scans/single/results/{id}` API method to obtain entity profile
            information.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MbrChk.UI.Model.ScanResult'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
    get:
      tags:
      - member-scans
      summary: Returns member scan history.
      description: <b>Member Scan - Scan History</b> provides a record of all scans performed for the selected organisation.
      operationId: member_single_scans_getallscans
      parameters:
      - name: userId
        in: query
        description: Scan user id.
        schema:
          type: integer
          format: int32
          default: 0
      - name: from
        in: query
        description: Scan date from (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: to
        in: query
        description: Scan date to (DD/MM/YYYY).
        schema:
          pattern: ^((0?[1-9]|[1-2][0-9]|3[0-1])/(0?[1-9]|1[0-2])/[0-9]{4})$
          type: string
      - name: firstName
        in: query
        description: All or part of First Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: middleName
        in: query
        description: All or part of Middle Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: lastName
        in: query
        description: Full Last Name. Only enter Latin or Roman scripts in this parameter.
        schema:
          type: string
          default: ''
      - name: scriptNameFullName
        in: query
        description: Full Original Script Name or Full Name. Only enter original script or full name in this parameter (i.e.
          Chinese, Japanese, Cyrillic, Arabic etc).
        schema:
          type: string
          default: ''
      - name: memberNumber
        in: query
        description: Full Member Number. This property has been superseded and will be deprecated in the future. Please use
          `clientId` instead.
        schema:
          type: string
          default: ''
      - name: clientId
        in: query
        description: Full Client ID.
        schema:
          type: string
          default: ''
      - name: idNumber
        in: query
        description: Full ID Number.
        schema:
          type: string
          default: ''
      - name: scanType
        in: query
        description: Scan Type. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - Single
            - Batch
            - Automatic
            - MonitoringRescan
            type: string
          default:
          - Single
      - name: scanService
        in: query
        description: Scan Service type. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - PepAndSanction
            - IDVerification
            - RiskAssessment
            type: string
          default:
          - PepAndSanction
      - name: matchType
        in: query
        description: Match Type. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - Close
            - Exact
            - ExactMidName
            type: string
          default:
          - Close
          - Exact
          - ExactMidName
      - name: whitelistPolicy
        in: query
        description: Whitelist Policy. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - Apply
            - Ignore
            type: string
          default:
          - Apply
          - Ignore
      - name: includeWebSearch
        in: query
        description: Web Search included or not. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - 'No'
            - 'Yes'
            type: string
          default:
          - 'No'
          - 'Yes'
      - name: includeAdvancedMedia
        in: query
        description: Advanced Media Search included or not. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - 'No'
            - 'Yes'
            type: string
          default:
          - 'No'
          - 'Yes'
      - name: scanResult
        in: query
        description: Scan Result Matched or Not Matched.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NoMatchesFound
            - MatchesFound
            type: string
          default:
          - MatchesFound
      - name: category
        in: query
        description: Category of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - TER
            - PEP
            - SIP
            - RCA
            - POI
            - All
            type: string
          default:
          - All
      - name: subCategory
        in: query
        description: SIP subcategories of entity in scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - SanctionsLists
            - LawEnforcement
            - RegulatoryEnforcement
            - OrganisedCrime
            - FinancialCrime
            - NarcoticsCrime
            - ModernSlavery
            - BriberyAndCorruption
            - CyberCrime
            - DisqualifiedDirectors
            - ReputationalRisk
            - Other
            - Insolvency
            - CustomWatchlist
            - WarCrimes
            - EndUseControl
            - EnvironmentalCrime
            - Fugitive
            - Gambling
            - HumanRightsViolation
            - InterstateCommerceViolation
            - LabourViolation
            - PharmaTrafficking
            - Piracy
            - UnauthorisedIncident
            - FormerSanctions
            - All
            type: string
          default:
          - All
      - name: decision
        in: query
        description: Due diligence decision of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NotReviewed
            - Match
            - NoMatch
            - NotSure
            - All
            type: string
          default:
          - All
      - name: risk
        in: query
        description: Assessed risk level of scan result. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - High
            - Medium
            - Low
            - Unallocated
            - All
            type: string
          default:
          - All
      - name: monitoringStatus
        in: query
        description: Monitoring update status (if available). See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NewMatches
            - UpdatedMatches
            - RemovedMatches
            - NoChanges
            - All
            type: string
          default:
          - NewMatches
          - UpdatedMatches
          - RemovedMatches
      - name: idvStatus
        in: query
        description: ID Verification result status. Only applicable for IDVerification scanService. See supported values below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - NotVerified
            - Verified
            - Pass
            - PartialPass
            - Fail
            - Pending
            - Incomplete
            - NotRequested
            - Matched
            - NotMatched
            - PartialMatched
            - InvalidDocument
            - Error
            - All
            type: string
          default:
          - All
      - name: idvFaceMatchStatus
        in: query
        description: FaceMatch Verification result status. Only applicable for IDVerification scanService. See supported values
          below.
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - Pass
            - Review
            - Fail
            - Pending
            - Incomplete
            - NotRequested
            - All
            type: string
          default:
          - All
      - name: pageIndex
        in: query
        description: The page index of results.
        schema:
          type: integer
          format: int32
          default: 0
      - name: pageSize
        in: query
        description: The number of items or results per page or request.
        schema:
          type: integer
          format: int32
          default: 20
      - name: X-Request-OrgId
        in: header
        description: Unique organisation identifier. This is optional and your default organisation will be used if not specified.
          You can specify the relevant Organisation ID if you are assigned to multiple organisations.
        schema:
          type: string
      responses:
        '200':
          description: Array of ScanHistoryLog; lists the scan match results for the scans that you searched for. The returned
            `scanId` should be used in `GET /member-scans/single/{id}` API method to obtain details of each scan.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MbrChk.UI.Model.ScanHistoryLog'
        '400':
          description: The request could not be understood or processed by the server.
        '401':
          description: The requested resource requires authentication.
        '500':
          description: An error has occurred on the server.
      security:
      - Bearer: []
      - ApiKey: []
  /api/v2/member-scans/single/report:
